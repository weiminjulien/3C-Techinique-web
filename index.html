<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C-Technique Anatomical Map</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f6f8fa;
            color: #24292f;
        }
        /* 左侧导航栏 */
        #sidebar {
            width: 280px;
            background-color: #ffffff;
            border-right: 1px solid #d0d7de;
            overflow-y: auto;
            padding: 20px 0;
        }
        .sidebar-header {
            padding: 0 20px 15px;
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px solid #d0d7de;
            margin-bottom: 10px;
        }
        .category {
            margin-bottom: 15px;
        }
        .category-title {
            padding: 5px 20px;
            font-size: 0.9em;
            color: #57606a;
            font-weight: bold;
            text-transform: uppercase;
        }
        .menu-item {
            padding: 8px 20px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 0.95em;
        }
        .menu-item:hover {
            background-color: #f3f4f6;
        }
        .menu-item.active {
            background-color: #eaf3ff;
            color: #0969da;
            font-weight: bold;
            border-left: 4px solid #0969da;
            padding-left: 16px;
        }
        /* 右侧主内容区 */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
        }
        #image-title {
            margin-top: 0;
            font-size: 1.8em;
            color: #24292f;
        }
        .image-container {
            position: relative;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(140,149,159,0.15);
            max-width: 100%;
        }
        #anatomy-image {
            max-width: 100%;
            max-height: 70vh;
            display: block;
            border-radius: 4px;
        }
        .placeholder-text {
            color: #57606a;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">解剖部位导航</div>
        <div id="menu-container">
            <!-- 菜单将由 JavaScript 动态生成 -->
            <div style="padding: 20px; color: #888;">加载中...</div>
        </div>
    </div>

    <div id="main-content">
        <h2 id="image-title">请选择一个部位</h2>
        <div class="image-container" id="image-container" style="display: none;">
            <!-- 如果未来有 Canvas 绘图，可以叠在这个 img 上面 -->
            <img id="anatomy-image" src="" alt="Anatomy Image">
        </div>
        <p class="placeholder-text" id="status-text">从左侧菜单选择要查看的解剖区域。</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const menuContainer = document.getElementById('menu-container');
            const imageTitle = document.getElementById('image-title');
            const anatomyImage = document.getElementById('anatomy-image');
            const imageContainer = document.getElementById('image-container');
            const statusText = document.getElementById('status-text');

            let currentActiveMenu = null;

            // 读取 JSON 数据
            fetch('shapes_data.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应失败，请确保您在本地使用了服务器(如 Live Server)或已部署到 GitHub Pages。');
                    }
                    return response.json();
                })
                .then(data => {
                    menuContainer.innerHTML = ''; // 清空加载提示
                    
                    data.categories.forEach(category => {
                        // 创建分类标题
                        const catDiv = document.createElement('div');
                        catDiv.className = 'category';
                        
                        const catTitle = document.createElement('div');
                        catTitle.className = 'category-title';
                        catTitle.textContent = category.category_name;
                        catDiv.appendChild(catTitle);

                        // 创建该分类下的图片列表
                        category.images.forEach(imgData => {
                            const menuItem = document.createElement('div');
                            menuItem.className = 'menu-item';
                            menuItem.textContent = imgData.title;
                            
                            // 点击事件处理
                            menuItem.onclick = () => {
                                // 切换激活状态样式
                                if (currentActiveMenu) {
                                    currentActiveMenu.classList.remove('active');
                                }
                                menuItem.classList.add('active');
                                currentActiveMenu = menuItem;

                                // 更新右侧内容
                                imageTitle.textContent = imgData.title;
                                anatomyImage.src = imgData.filename;
                                imageContainer.style.display = 'block';
                                statusText.textContent = `当前文件: ${imgData.filename}`;

                                // 注意：未来如果你需要在图片上画形状，可以在这里读取 imgData.shapes 并在图片上生成 SVG 或 Canvas 元素。
                            };
                            
                            catDiv.appendChild(menuItem);
                        });

                        menuContainer.appendChild(catDiv);
                    });

                    // 默认加载第一张图片
                    if (data.categories.length > 0 && data.categories[0].images.length > 0) {
                        const firstItem = menuContainer.querySelector('.menu-item');
                        if (firstItem) firstItem.click();
                    }

                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                    menuContainer.innerHTML = `<div style="padding: 20px; color: red;">无法加载 shapes_data.json。<br><br>原因可能：<br>1. 文件名不匹配。<br>2. 直接双击打开html会引发跨域错误，请使用 VSCode 的 Live Server 插件或推送到 GitHub 查看。</div>`;
                });
        });
    </script>
</body>
</html>
