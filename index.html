<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C-Technique Anatomical Map</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #f6f8fa;
        }
        /* 左侧扁平导航栏 */
        #sidebar {
            width: 250px;
            background-color: #ffffff;
            border-right: 1px solid #d0d7de;
            overflow-y: auto;
            padding-top: 15px;
        }
        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            font-size: 0.95em;
            color: #24292f;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }
        .menu-item:hover {
            background-color: #f3f4f6;
        }
        .menu-item.active {
            background-color: #eaf3ff;
            color: #0969da;
            font-weight: bold;
            border-left: 4px solid #0969da;
            padding-left: 16px;
        }
        /* 右侧内容区 */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            overflow-y: auto;
        }
        #image-title {
            margin: 0 0 20px 0;
            font-size: 1.5em;
            color: #24292f;
        }
        .image-container {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(140,149,159,0.15);
            max-width: 100%;
        }
        #anatomy-image {
            max-width: 100%;
            max-height: 75vh;
            display: block;
            border-radius: 4px;
        }
        .info-text {
            color: #57606a;
            margin-top: 15px;
            font-size: 0.9em;
        }
        .error-text {
            color: #cf222e;
            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="sidebar" id="menu-container">
        <!-- 菜单由 JS 生成 -->
        <div style="padding: 20px; color: #888;">正在加载菜单...</div>
    </div>

    <div id="main-content">
        <h2 id="image-title">选择部位</h2>
        <div class="image-container" id="image-container" style="display: none;">
            <img id="anatomy-image" src="" alt="解剖图">
        </div>
        <div class="info-text" id="status-text">请点击左侧列表查看。</div>
        <div class="error-text" id="error-text">⚠️ 图片加载失败，请检查 github 仓库里该图片是否真实存在，或者后缀名(.jpg/.png)是否正确！</div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sidebar = document.getElementById('sidebar');
            const imageTitle = document.getElementById('image-title');
            const anatomyImage = document.getElementById('anatomy-image');
            const imageContainer = document.getElementById('image-container');
            const statusText = document.getElementById('status-text');
            const errorText = document.getElementById('error-text');

            let currentActiveMenu = null;

            // 监听图片加载失败事件
            anatomyImage.onerror = () => {
                errorText.style.display = 'block';
                anatomyImage.style.display = 'none';
            };
            
            // 监听图片加载成功事件
            anatomyImage.onload = () => {
                errorText.style.display = 'none';
                anatomyImage.style.display = 'block';
            };

            fetch('shapes_data.json')
                .then(response => response.json())
                .then(data => {
                    sidebar.innerHTML = ''; // 清空加载提示
                    
                    data.images.forEach(imgData => {
                        const menuItem = document.createElement('div');
                        menuItem.className = 'menu-item';
                        menuItem.textContent = imgData.title;
                        
                        menuItem.onclick = () => {
                            if (currentActiveMenu) currentActiveMenu.classList.remove('active');
                            menuItem.classList.add('active');
                            currentActiveMenu = menuItem;

                            imageTitle.textContent = imgData.title;
                            anatomyImage.src = imgData.filename; 
                            imageContainer.style.display = 'block';
                            statusText.textContent = `对应文件: ${imgData.filename}`;
                        };
                        
                        sidebar.appendChild(menuItem);
                    });

                    // 默认点击打开第一张
                    if (sidebar.firstChild) sidebar.firstChild.click();
                })
                .catch(err => {
                    sidebar.innerHTML = `<div style="padding: 20px; color: red;">读取数据失败，请确认推送到 GitHub。</div>`;
                });
        });
    </script>
</body>
</html>
