<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>3C 医学影像系统</title>

<style>
body {
    display: flex;
    margin: 0;
    font-family: Arial;
    background: #1e1e1e;
    color: #eee;
    height: 100vh;
}

/* 登录 */
#loginScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #2c3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.login-box {
    background: white;
    padding: 30px;
    border-radius: 10px;
    color: black;
    text-align: center;
}

/* 左侧菜单 */
#sidebar {
    width: 260px;
    background: #252526;
    padding: 15px;
    overflow-y: auto;
}

.menu-item {
    padding: 10px;
    margin: 5px 0;
    background: #333;
    cursor: pointer;
}

.menu-item:hover, .active {
    background: #007acc;
}

/* 主区域 */
#main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.image-container {
    position: relative;
}

img {
    max-width: 90%;
}

/* SVG */
svg {
    position: absolute;
    top: 0;
    left: 0;
}

.shape {
    fill: transparent;
    stroke: cyan;
    cursor: pointer;
}

.shape:hover {
    fill: rgba(255,255,0,0.3);
}
</style>
</head>

<body>

<!-- 登录 -->
<div id="loginScreen">
    <div class="login-box">
        <h2>🔒 医学系统</h2>
        <input type="password" id="pwd" placeholder="输入密码">
        <br><br>
        <button onclick="login()">进入</button>
    </div>
</div>

<!-- 左侧 -->
<div id="sidebar">
    <h3>📂 系统目录</h3>

    <!-- 头部 -->
    <div class="menu-item" onclick="loadImage('head.png', this)">🧠 头部</div>

    <!-- 胸部 -->
    <div class="menu-item" onclick="loadImage('chest.png', this)">🫁 胸部</div>

    <!-- 腹部 -->
    <div class="menu-item" onclick="loadImage('abdomen.png', this)">🫃 腹部</div>

    <!-- 手 -->
    <div class="menu-item active" onclick="loadImage('hand_front.jpg', this)">🖐 手掌</div>
    <div class="menu-item" onclick="loadImage('hand_back.jpg', this)">🖐 手背</div>

    <!-- 上臂 -->
    <div class="menu-item" onclick="loadImage('arm_front.png', this)">💪 上臂前</div>
    <div class="menu-item" onclick="loadImage('arm_back.png', this)">💪 上臂后</div>
</div>

<!-- 主区域 -->
<div id="main">
    <div class="image-container">
        <p id="loading">请选择部位...</p>
        <img id="img">
        <svg id="svg"></svg>
    </div>
</div>

<script>

// 登录
function login(){
    if(document.getElementById('pwd').value === '888888'){
        document.getElementById('loginScreen').style.display = 'none';
    }else{
        alert('密码错误');
    }
}

let data = {};

// 读取JSON
fetch('shapes_data.json')
.then(r=>r.json())
.then(d=>data=d)
.catch(()=>alert('⚠️ JSON未找到'));

function loadImage(name, el){

    document.getElementById('loading').innerText = "加载中...";

    document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
    if(el) el.classList.add('active');

    let img = document.getElementById('img');
    let svg = document.getElementById('svg');

    img.src = name;

    img.onload = ()=>{
        document.getElementById('loading').innerText = "";

        svg.setAttribute("viewBox", `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
        draw(name);
    }
}

function draw(name){
    let svg = document.getElementById('svg');
    svg.innerHTML = "";

    if(!data[name]) return;

    data[name].forEach(s=>{
        let p = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

        let str = "";
        for(let i=0;i<s.coords.length;i+=2){
            str += s.coords[i]+","+s.coords[i+1]+" ";
        }

        p.setAttribute("points", str);
        p.setAttribute("class","shape");

        p.onclick = ()=>{
            alert("点击区域 ID: "+s.group_id);
        }

        svg.appendChild(p);
    });
}

</script>

</body>
</html>
